name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows portable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Build win-unpacked
        run: npx electron-builder --win --dir

      - name: Read package version
        id: pkg
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Zip win-unpacked
        shell: pwsh
        run: |
          $zipName = "PostMON-${{ steps.pkg.outputs.version }}-win-unpacked.zip"
          Compress-Archive -Path dist/win-unpacked/* -DestinationPath "dist/$zipName" -Force
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build portable exe
        run: npx electron-builder --win portable

      - name: Upload artifacts to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PostMON-${{ steps.pkg.outputs.version }}-win-unpacked.zip
            dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload artifacts to workflow run
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: postmon-windows-${{ steps.pkg.outputs.version }}
          path: |
            dist/PostMON-${{ steps.pkg.outputs.version }}-win-unpacked.zip
            dist/*.exe
          retention-days: 14
